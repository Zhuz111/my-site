<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наши тренеры</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #950059;
        }
                 

        header {
            background: #2d0324;
            color: white;
            padding: 20px;
            text-align: center;
        }
        

        .container {
            color: thistle;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .card {
            background: #000000;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: contain;
            background: #1a1a1a;
         padding: 10px;
        }

        .card h3 {
            margin: 15px 0 5px;
        }

        .card p {
            color: #ffffff;
            margin-bottom: 15px;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #111;
            color: white;
            margin-top: 20px;
        }
        
        /* МЕНЮ */
.nav-header {
    background: #950059;

    justify-content: space-between;
    align-items: center;

}

/* УБИРАЕМ ВСЁ ЛИШНЕЕ */
.nav-header {
    border: none;

}

/* ССЫЛКИ */
nav a {
    color: white;

    margin: 0 12px;
}

nav a:hover {
    color: #ffcc00;
}

/* ЗАГОЛОВОК СТРАНИЦЫ */
.page-title {
    text-align: center;
    padding: 40px 20px;
    color: white;
}
    </style>
</head>
